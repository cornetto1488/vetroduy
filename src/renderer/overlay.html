<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; user-select: none;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif; }
  #wrap {
    padding: 10px 12px; border-radius: 14px;
    background: rgba(10, 12, 24, 0.62);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(6px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
    color: #eef1ff; display: inline-flex; flex-direction: column; gap: 7px;
    min-width: 210px; max-width: 296px;
  }
  .head { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; letter-spacing: .04em; opacity: .85; }
  .head img { width: 18px; height: 18px; }
  .row { display: flex; align-items: center; gap: 7px; font-size: 13px; line-height: 1.3; }
  .row .ico { flex-shrink: 0; }
  .row .txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .spk { color: #7bffb6; font-weight: 600; }
  .np { color: #b9c0ff; }
  .dim { color: rgba(238,241,255,.5); font-size: 12px; }
  .pulse { animation: p 1.3s ease-in-out infinite; }
  @keyframes p { 0%,100%{opacity:1} 50%{opacity:.45} }
  #wrap.empty { opacity: .0; transition: opacity .3s; }
  #wrap { transition: opacity .3s; }
</style>
</head>
<body>
  <div id="wrap" class="empty">
    <div class="head"><img src="logo-anim.png" alt="" /><span>ВЕТРОДУЙ</span></div>
    <div id="speakers"></div>
    <div id="np"></div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const wrap = document.getElementById('wrap');
    const spk = document.getElementById('speakers');
    const np = document.getElementById('np');

    ipcRenderer.on('overlay:data', (e, d) => {
      d = d || {};
      spk.innerHTML = '';
      const names = (d.speakers || []).filter(Boolean);
      if (names.length) {
        for (const n of names) {
          const r = document.createElement('div'); r.className = 'row';
          r.innerHTML = '<span class="ico pulse">🔊</span><span class="txt spk"></span>';
          r.querySelector('.txt').textContent = n;
          spk.appendChild(r);
        }
      } else {
        const r = document.createElement('div'); r.className = 'row';
        r.innerHTML = '<span class="ico">🎙️</span><span class="txt dim">тишина в войсе</span>';
        spk.appendChild(r);
      }
      np.innerHTML = '';
      if (d.now) {
        const r = document.createElement('div'); r.className = 'row';
        r.innerHTML = '<span class="ico">🎵</span><span class="txt np"></span>';
        r.querySelector('.txt').textContent = d.now;
        np.appendChild(r);
      }
      const anything = names.length || d.now || d.inCall;
      wrap.classList.toggle('empty', !anything);
    });
  </script>
</body>
</html>
